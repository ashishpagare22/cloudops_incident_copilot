name: cloudops-incident-copilot-ci

on:
  push:
    paths:
      - "cloudops_incident_copilot/**"
      - ".github/workflows/cloudops-incident-copilot-ci.yml"
  pull_request:
    paths:
      - "cloudops_incident_copilot/**"
      - ".github/workflows/cloudops-incident-copilot-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudops_incident_copilot

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
